# Axon OS — ruff configuration
line-length = 100
target-version = "py310"

[lint]
# Enable comprehensive linting rules
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "RUF",  # Ruff-specific rules
]

# Exclude rules:
# E501: long lines tolerated in UI/string-heavy GTK code
# E402: gi.require_version() must precede `from gi.repository import ...`,
#       so module-level imports legitimately appear after code
ignore = ["E501", "E402"]

exclude = [
    ".git",
    ".venv",
    "build",
    "dist",
    ".eggs",
    "*.egg-info",
    "venv",
]

[lint.isort]
known-first-party = ["apps", "services", "installer"]
