name: CI - Tests, Lint, Type Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dbus python3-gi python3-gi-cairo gir1.2-gtk-4.0 gir1.2-adw-1 gir1.2-vte-2.91 \
          build-essential pkg-config meson libdbus-1-dev libglib2.0-dev libcairo2-dev libgirepository-2.0-dev
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    
    - name: Lint with ruff
      run: |
        ruff check apps/ services/ tests/ installer/ --select E4,E7,E9,F,I --ignore E402 --statistics
    
    - name: Type check with mypy
      run: |
        mypy apps/ services/ --ignore-missing-imports --no-error-summary 2>&1 | head -50 || true
      continue-on-error: true
    
    - name: Run pytest
      run: |
        pytest tests/ -v --tb=short --cov=apps --cov=services --cov-report=term-missing
      continue-on-error: true
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true
