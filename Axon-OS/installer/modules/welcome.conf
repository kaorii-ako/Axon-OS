# Calamares welcome module configuration — Axon OS
# https://github.com/calamares/calamares/tree/calamares/src/modules/welcome

---

# Whether to show the "Support URL" button in the welcome screen.
showSupportUrl:      false

# Whether to show the "Known Issues" button.
showKnownIssuesUrl:  false

# Whether to show the "Release Notes" button.
showReleaseNotesUrl: false

# Whether to show the "Donate" button.
showDonateUrl:       false

# List of prerequisites that are checked before allowing installation.
requirements:
    # Minimum disk space in GiB.
    - id:       storage
      required: true
      check:    true
      kilobytes: 20971520    # 20 GiB

    # Minimum RAM in bytes.
    - id:       ram
      required: true
      check:    true
      kilobytes: 2097152     # 2 GiB

    # Internet connectivity — optional (Axon OS installs fully offline).
    - id:       internet
      required: false
      check:    true

    # Whether the user is running as root (required for live sessions).
    - id:       root
      required: true
      check:    true

    # Warn if running inside a virtual machine (not a blocker).
    - id:       virtualmachine
      required: false
      check:    true

# Optionally display a product logo above the welcome text.
# (Relative to the branding directory; set to "" to disable.)
# logo: "logo.png"

# Language list to show in the welcome combo box.
# Leave empty to auto-detect from the running system locale.
languages: []
