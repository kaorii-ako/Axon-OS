# Calamares finished module configuration — Axon OS
# https://github.com/calamares/calamares/tree/calamares/src/modules/finished

---

# Command to execute when "Restart Now" is clicked.
restartNowCommand: "systemctl reboot"

# If true, the installer will restart automatically after exec without
# waiting for the user to click "Done / Restart".
notAutomatic: false

# If true, the "Restart Now" checkbox is ticked by default.
restartNowChecked: true

# Whether to show the "Restart Now" checkbox at all.
restartNowEnabled: true
