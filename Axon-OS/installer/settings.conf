# Calamares settings — Axon OS
# https://github.com/calamares/calamares/blob/calamares/src/calamares/settings.conf

---

# Path(s) to look for modules (jobs, viewmodules).
modules-search: [ local, /usr/lib/calamares/modules ]

# Sequence of pages to show in the installer.
# Each entry is a "show" or "exec" phase.
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - services-systemd
    - grubcfg
    - bootloader
    - packages
    - luksbootkeyfile
    - plymouthcfg
    - initramfscfg
    - initramfs
    - removeuser
    - umount
  - show:
    - finished

# Branding component name (matches branding/<name>/branding.desc).
branding: axon

# Prompt before exiting if the install hasn't finished.
prompt-install: false

# Globally disable module requirements checking (set false for production).
disable-cancel: false
disable-cancel-during-exec: true

# Log verbosity: 0 = default, 8 = debug.
debug-mode: false
