<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy context="default">
    <!-- Allow owner to register service -->
    <allow own="org.axonos.Context"/>
    <!-- Allow clients to send messages to Context service -->
    <allow send_destination="org.axonos.Context"/>
    <!-- Allow receiving messages/signals from Context service -->
    <allow receive_sender="org.axonos.Context"/>
  </policy>
</busconfig>
